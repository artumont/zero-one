name: Feature Request
description: Suggest an idea for this project
title: "[PREFIX] <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues to ensure it hasn't already been suggested.

        Helpful references:
        - Roadmap: https://github.com/artumont/zero-one/blob/dev/docs/ROADMAP.md
        - Upstream OpenCode README: https://github.com/opencode-ai/opencode
        - Tauri docs: https://v2.tauri.app/
        - Vue docs: https://vuejs.org/guide/introduction.html
  - type: input
    id: prefix
    attributes:
      label: Title prefix
      description: Use a bracketed prefix from the roadmap (e.g., [UI], [CORE], [ACP]).
      placeholder: "[UI]"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the problem or gap this feature addresses.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested Solution
      description: Describe the expected behavior, UI, or API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      description: Include likely modules, file paths, constraints, or risks a contributor should know.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
