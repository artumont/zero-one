name: Bug Report
description: Create a report to help us improve
title: "[BUG] <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail that someone new to the repo can reproduce, debug, and verify the fix.

        Helpful references:
        - Roadmap: https://github.com/artumont/zero-one/blob/dev/docs/ROADMAP.md
        - Tauri commands and event docs: https://v2.tauri.app/develop/calling-rust/
        - Vue guide: https://vuejs.org/guide/introduction.html
        - Upstream OpenCode README: https://github.com/opencode-ai/opencode
  - type: input
    id: prefix
    attributes:
      label: Title prefix
      description: Use a bracketed prefix from the roadmap (e.g., [UI], [CORE], [ACP]).
      placeholder: "[UI]"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Current Behavior
      description: What actually happens, including any visible error or incorrect output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce the behavior from a clean state.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any relevant logs or attach screenshots of the issue.
  - type: textarea
    id: likely_area
    attributes:
      label: Likely Area
      description: Which package, module, or feature area seems related?
      placeholder: |
        - packages/zero-one/src/core/logging.rs
        - packages/ui/src/App.vue
        - packages/ui/src-tauri/src/lib.rs
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this bug affect?
      options:
        - packages/zero-one
        - packages/ui
        - both
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS version, Rust version, Node version, etc.
  - type: textarea
    id: verification
    attributes:
      label: Verification Notes
      description: How can someone confirm the fix worked?
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
