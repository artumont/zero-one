[package]
name = "zero-one"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
ratatui = "0.30.0"
color-eyre = "0.6.3"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
dotenvy = "0.15.7"
envy = "0.4.2"
fern = { version = "0.7.1", features = ["chrono", "date-based"] }
chrono = "0.4.44"
log = "0.4.29"
file-rotate = "0.8.0"
toasty = { version = "0.4.0", features = ["jiff", "mysql", "serde"] }
jiff = "0.2.24"
